<!DOCTYPE html>
<html lang="et" id="html-root" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nädalavaade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./assets/css/style.css" rel="stylesheet">
</head>
<body class="container-fluid py-3 py-md-4">

    <div class="print-page-shell">

        <div class="print-toolbar-card no-print p-2 p-md-3 mb-3">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
                <div class="d-flex flex-wrap gap-2">
                    <button onclick="window.print()" class="btn btn-primary btn-sm rounded-pill">
                        🖨️ Prindi / Salvesta PDF
                    </button>
                    <button onclick="window.close()" class="btn btn-outline-secondary btn-sm rounded-pill">
                        Sulge aken
                    </button>
                    <a href="./index.html" class="btn btn-outline-secondary btn-sm rounded-pill">
                        Avaleht
                    </a>
                </div>

                <div class="print-note">
                    Vaade on optimeeritud A4 formaadile
                </div>
            </div>
        </div>

        <div class="print-hero-card mb-3">
            <div class="print-hero-banner text-center">
                <div class="print-badge mb-3">Nädalavaade</div>
                <h1 id="print-title" class="print-title mb-2">Laen vaadet...</h1>
                <p class="print-subtitle mb-3">
                    Terve nädala ülevaade ühel lehel
                </p>
                <div id="print-last-updated" class="meta-chip">
                    Laen andmeid...
                </div>
            </div>
        </div>

        <div id="print-error" class="alert alert-danger d-none mb-3" role="alert">
            Nädalavaadet ei õnnestunud laadida.
        </div>

        <div class="print-table-card">
            <div class="table-responsive">
                <table class="table table-bordered print-table align-middle mb-0">
                    <thead>
                        <tr class="table-light">
                            <th>Tund</th>
                            <th>Esmaspäev</th>
                            <th>Teisipäev</th>
                            <th>Kolmapäev</th>
                            <th>Neljapäev</th>
                            <th>Reede</th>
                        </tr>
                    </thead>
                    <tbody id="print-table-body"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="./assets/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const errorEl = document.getElementById('print-error');
            const titleEl = document.getElementById('print-title');
            const updatedEl = document.getElementById('print-last-updated');
    
            try {
                if (typeof initTheme !== 'function') {
                    throw new Error('app.js ei laadinud õigesti');
                }
    
                if (typeof initPrintPage !== 'function') {
                    throw new Error('initPrintPage funktsioon puudub app.js failist');
                }
    
                initTheme();
                await initPrintPage();
            } catch (error) {
                console.error(error);
    
                if (titleEl) {
                    titleEl.textContent = 'Nädalavaate laadimine ebaõnnestus';
                }
    
                if (updatedEl) {
                    updatedEl.textContent = error.message || 'Tundmatu JavaScripti viga';
                }
    
                if (errorEl) {
                    errorEl.textContent = 'Viga nädalavaate käivitamisel: ' + (error.message || 'Tundmatu viga');
                    errorEl.classList.remove('d-none');
                }
            }
        });
    </script>
</body>
</html>
