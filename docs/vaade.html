<!DOCTYPE html>
<html lang="et" id="html-root" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tunniplaan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./assets/css/style.css" rel="stylesheet">
</head>
<body class="container-fluid py-3 py-md-4">

    <div class="position-fixed top-0 end-0 p-3" style="z-index: 1050;">
        <button class="btn btn-outline-secondary rounded-circle shadow-sm" id="theme-toggle" title="Vaheta teemat (Dark/Light)">
            <span id="theme-icon">🌙</span>
        </button>
    </div>

    <div class="page-shell">

        <div class="topbar-card p-2 p-md-3 mb-3 sticky-toolbar">
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
                <div class="d-flex flex-wrap align-items-center gap-2">
                    <a class="btn btn-outline-secondary btn-sm rounded-pill" href="./index.html">Avaleht</a>
                    <a class="btn btn-outline-secondary btn-sm rounded-pill" href="./opetajad.html">Õpetajad</a>
                    <a class="btn btn-outline-secondary btn-sm rounded-pill" href="./klassid.html">Klassid</a>
                    <a class="btn btn-outline-secondary btn-sm rounded-pill" href="./ruumid.html">Ruumid</a>
                </div>

                <a id="nav-back-link" href="./index.html" class="btn btn-primary btn-sm rounded-pill">
                    Tagasi valikusse
                </a>
            </div>
        </div>

        <div class="hero-card mb-3">
            <div class="hero-banner">
                <div class="hero-title-row">
                    <a id="prev-link" href="#" class="btn btn-outline-secondary hero-nav-btn d-none" title="Eelmine">&larr;</a>

                    <div class="text-center px-1">
                        <h1 id="page-title" class="hero-title">Laen tunniplaani...</h1>
                        <div class="hero-subtitle">
                            Mugav päevavaade koos kiire navigeerimisega
                        </div>
                    </div>

                    <a id="next-link" href="#" class="btn btn-outline-secondary hero-nav-btn d-none" title="Järgmine">&rarr;</a>
                </div>

                <div class="d-flex justify-content-center mt-3">
                    <div id="last-updated-text" class="meta-chip">
                        Laen andmeid...
                    </div>
                </div>
            </div>
        </div>

        <div class="section-card p-3 p-md-4 mb-3">
            <div class="toolbar-grid">
                <div>
                    <div class="mobile-section-title">Vali päev</div>
                    <div id="day-buttons" class="day-scroll" role="group"></div>
                </div>

                <div>
                    <div class="mobile-section-title">Kiired tegevused</div>
                    <div class="action-row">
                        <button id="saveViewButton" class="btn btn-outline-success btn-sm">
                            Salvesta minu vaikevaateks
                        </button>
                        <a id="printViewButton" href="#" target="_blank" class="btn btn-outline-secondary btn-sm">
                            🖨️ Nädalavaade
                        </a>
                        <span id="saveConfirmation" class="text-success align-self-center d-none">Salvestatud!</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-error" class="alert alert-danger d-none mb-3" role="alert">
            Vaadet ei õnnestunud laadida.
        </div>

        <div class="section-card d-none d-lg-block mb-3">
            <div class="desktop-table-wrap">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr id="desktop-header-row"></tr>
                    </thead>
                    <tbody id="desktop-timetable-body"></tbody>
                </table>
            </div>
        </div>

        <div class="d-lg-none mb-3">
            <div class="helper-note mb-2">
                Mobiilivaates on tunnid kuvatud kaartidena, et neid oleks lihtsam lugeda.
            </div>
            <div id="mobile-timetable" class="mobile-list"></div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            initTheme();
            await initViewPage();
        });
    </script>
</body>
</html>
