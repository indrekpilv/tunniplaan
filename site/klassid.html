<!DOCTYPE html>
<html lang="et" id="html-root" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasside tunniplaan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./assets/css/style.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <div class="position-absolute top-0 end-0 p-3" style="z-index: 1050;">
        <button class="btn btn-outline-secondary rounded-circle shadow-sm" id="theme-toggle" title="Vaheta teemat (Dark/Light)">
            <span id="theme-icon">🌙</span>
        </button>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6 text-center">

            <h1 class="mb-4">Rakvere Eragümnaasiumi klasside tunniplaan</h1>

            <p class="text-muted mb-4" id="last-updated-text">Laen andmeid...</p>

            <form class="position-relative">
                <div class="mb-3">
                    <input class="form-control form-control-lg" id="searchInput" placeholder="Otsi või klõpsa, et valida..." autocomplete="off">
                    <div id="search-results" class="list-group"></div>
                </div>
            </form>

            <div id="page-error" class="alert alert-danger d-none" role="alert">
                Andmeid ei õnnestunud laadida.
            </div>

            <hr class="my-4">
            <a href="./index.html" class="btn btn-outline-secondary">Tagasi avalehele</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            initTheme();

            const data = await loadTimetableData();
            const lastUpdatedEl = document.getElementById('last-updated-text');
            const errorEl = document.getElementById('page-error');

            if (!data) {
                lastUpdatedEl.textContent = 'Andmed puuduvad.';
                errorEl.classList.remove('d-none');
                return;
            }

            lastUpdatedEl.textContent = `Plaani viimane uuendus: ${data.meta?.last_updated || 'Teadmata'}`;

            const classes = Object.entries(data.classes || {}).map(([id, name]) => ({
                id,
                name,
                type: 'class'
            }));

            initLiveSearch(classes);
        });
    </script>
</body>
</html>
