<!DOCTYPE html>
<html lang="et" id="html-root" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakvere Eragümnaasiumi tunniplaan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./assets/css/style.css" rel="stylesheet">
    <style>
        body {
            transition: background-color 0.3s, color 0.3s;
        }
    </style>
</head>
<body class="container mt-5">

    <div class="position-absolute top-0 end-0 p-3" style="z-index: 1050;">
        <button class="btn btn-outline-secondary rounded-circle shadow-sm" id="theme-toggle" title="Vaheta teemat (Dark/Light)">
            <span id="theme-icon">🌙</span>
        </button>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6 text-center">

            <h1 class="mb-4">Rakvere Eragümnaasiumi tunniplaan</h1>

            <p class="text-muted mb-4" id="last-updated-text">Laen andmeid...</p>

            <div class="d-grid gap-3" id="main-menu">
                <a href="./opetajad.html" class="btn btn-primary btn-lg fs-4 py-3">
                    Õpetajate tunniplaanid
                </a>
                <a href="./klassid.html" class="btn btn-success btn-lg fs-4 py-3">
                    Klasside tunniplaanid
                </a>
                <a href="./ruumid.html" class="btn btn-info btn-lg fs-4 py-3">
                    Ruumide tunniplaanid
                </a>
            </div>

            <div id="home-error" class="alert alert-danger mt-4 d-none" role="alert">
                Tunniplaani andmeid ei õnnestunud laadida.
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            initTheme();

            const data = await loadTimetableData();
            const lastUpdatedEl = document.getElementById('last-updated-text');
            const errorEl = document.getElementById('home-error');

            if (!data) {
                lastUpdatedEl.textContent = 'Andmed puuduvad.';
                errorEl.classList.remove('d-none');
                initHomeLogic();
                return;
            }

            const lastUpdated = data.meta?.last_updated || 'Teadmata';
            lastUpdatedEl.textContent = `Plaani viimane uuendus: ${lastUpdated}`;

            initHomeLogic();
        });
    </script>
</body>
</html>
